spring.application.name=avis

# Active profile (can be overridden via SPRING_PROFILES_ACTIVE env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Defer data.sql until after Hibernate creates the schema (required when using ddl-auto=create-drop)
spring.jpa.defer-datasource-initialization=true

# JWT (shared across profiles)
jwt.secret=${JWT_SECRET:avisHeuristiquesSecretKeyForJWTSigningMustBe256BitsLong!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (shared across profiles)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
