# ── Test overrides ────────────────────────────────────────────────────────────

# JWT (required for full context load in @SpringBootTest)
jwt.secret=testSecretKeyForJWTSigningUsedOnlyInTestsMustBe256BitsLong!!
jwt.expiration=3600000

# CORS
cors.allowed-origins=http://localhost:3000

# H2 in-memory datasource for all tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# Suppress data.sql in tests (test data is created programmatically)
spring.sql.init.mode=never

spring.h2.console.enabled=false
