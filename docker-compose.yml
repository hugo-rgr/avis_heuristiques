version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: avis_postgres
    environment:
      POSTGRES_DB: avisdb
      POSTGRES_USER: ${DATABASE_USER:-avis}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-avis_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-avis} -d avisdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avis_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/avisdb
      DATABASE_USER: ${DATABASE_USER:-avis}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-avis_secret}
      JWT_SECRET: ${JWT_SECRET:-avisHeuristiquesSecretKeyForJWTSigningMustBe256BitsLong!!}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    restart: on-failure

volumes:
  pg_data:
